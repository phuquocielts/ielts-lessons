<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đăng ký học tăng cường</title>
<style>
body{font-family:Arial;background:#1e88e5;margin:0;padding:30px}
.c{max-width:700px;margin:auto;background:#fff;padding:30px;border-radius:16px}
.notice{background:#fff8e1;border-left:5px solid orange;padding:15px}
.group{background:#f5f7fb;padding:15px;border-radius:10px;margin-top:20px}
button{width:100%;padding:14px;background:#1565c0;color:#fff;border:0;border-radius:10px}
input[type=text]{width:100%;padding:10px}
</style></head><body><div class="c">
<h1>📚 ĐĂNG KÝ HỌC TĂNG CƯỜNG IELTS</h1>
<div class="notice"><b>Những bạn dự định thi tháng 8 năm sau KHÔNG cần đăng ký.</b></div>
<form id="f" action="https://formspree.io/f/mnjeqnav" method="POST">
<p>Họ và tên</p><input type="text" name="Họ và tên" required>
<div class="group"><h3>Dành cho học sinh LỊCH 2</h3>
<label><input type="radio" name="Lớp đăng ký" value="Lịch 2 - Thứ 5 (9:30-11:00)" required> Thứ 5 (9:30 - 11:00)</label><br>
<label><input type="radio" name="Lớp đăng ký" value="Lịch 2 - Tối Thứ 4 (7:15-8:45)"> Tối Thứ 4 (7:15 - 8:45)</label></div>
<div class="group"><h3>Dành cho học sinh LỊCH 1</h3>
<label><input type="radio" name="Lớp đăng ký" value="Lịch 1 - Thứ 6 (9:30)"> Thứ 6 (9:30)</label><br>
<label><input type="radio" name="Lớp đăng ký" value="Lịch 1 - Thứ 6 (4:30)"> Thứ 6 (4:30)</label></div>
<p><button>Đăng ký ngay</button></p></form><div id="s"></div></div>
<script>
const f=document.getElementById('f'),s=document.getElementById('s');
f.addEventListener('submit',async e=>{e.preventDefault();
const r=await fetch(f.action,{method:'POST',body:new FormData(f),headers:{Accept:'application/json'}});
s.innerHTML=r.ok?'✅ Đăng ký thành công!':'❌ Có lỗi xảy ra.';
if(r.ok)f.reset();
});
</script></body></html>
