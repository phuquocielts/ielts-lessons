<title>IELTS Listening · Gen Z</title>
<style>
  /* Bảng màu navy + gold, hài hòa với IELTS Phú Quốc */
  :root {
    --bg: #0a1830; --bg2: #0e2145;
    --panel: rgba(255,255,255,0.045); --panel-solid: #122644; --panel-2: rgba(255,255,255,0.07);
    --brd: rgba(201,169,106,0.20); --ink: #f4efe1; --muted: #a7b6d1;
    --pink: #c9a96a; --violet: #3a63b0; --cyan: #6f9fd6; --lime: #d8bd7b;
    --good: #57c08a; --good-bg: rgba(87,192,138,0.15);
    --bad: #e46b83; --bad-bg: rgba(228,107,131,0.16);
    --shadow: 0 22px 55px -22px rgba(0,0,0,0.75);
    --font: "Trebuchet MS", "Segoe UI", system-ui, -apple-system, sans-serif;
    --serif: Georgia, "Times New Roman", "Playfair Display", serif;
  }
  :root[data-theme="light"] {
    --bg: #f4f1e7; --bg2: #ece7d8; --panel: rgba(20,35,70,0.035); --panel-solid: #ffffff;
    --panel-2: rgba(20,35,70,0.06); --brd: rgba(30,45,80,0.16); --ink: #14233f; --muted: #5c6b86;
    --pink: #a8843a; --violet: #234b8c; --cyan: #2f6aa8; --lime: #c2a35a;
    --good: #1a8f5f; --good-bg: rgba(26,143,95,0.10); --bad: #cf4d68; --bad-bg: rgba(207,77,104,0.10);
    --shadow: 0 22px 50px -26px rgba(20,35,70,0.35);
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --bg: #f4f1e7; --bg2: #ece7d8; --panel: rgba(20,35,70,0.035); --panel-solid: #ffffff;
      --panel-2: rgba(20,35,70,0.06); --brd: rgba(30,45,80,0.16); --ink: #14233f; --muted: #5c6b86;
      --pink: #a8843a; --violet: #234b8c; --cyan: #2f6aa8; --lime: #c2a35a;
      --good: #1a8f5f; --good-bg: rgba(26,143,95,0.10); --bad: #cf4d68; --bad-bg: rgba(207,77,104,0.10);
      --shadow: 0 22px 50px -26px rgba(20,35,70,0.35);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: var(--font); color: var(--ink); min-height: 100vh;
    background:
      radial-gradient(1000px 520px at 12% -8%, rgba(58,99,176,0.28), transparent 60%),
      radial-gradient(820px 460px at 100% 0%, rgba(201,169,106,0.16), transparent 55%),
      radial-gradient(700px 600px at 50% 120%, rgba(111,159,214,0.12), transparent 60%),
      linear-gradient(160deg, var(--bg), var(--bg2));
    background-attachment: fixed; -webkit-font-smoothing: antialiased; line-height: 1.5;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 20px 16px 90px; }

  header { text-align: center; margin: 6px 0 14px; }
  .kicker { display: inline-block; font-size: 11.5px; font-weight: 800; letter-spacing: .16em;
    text-transform: uppercase; color: var(--muted); padding: 6px 13px; border-radius: 999px;
    border: 1px solid var(--brd); background: var(--panel); }
  h1 { margin: 12px 0 6px; font-family: var(--serif); font-size: clamp(30px, 7vw, 50px); font-weight: 800; letter-spacing: .02em;
    line-height: 1; text-wrap: balance;
    background: linear-gradient(100deg, var(--lime), var(--pink) 55%, var(--violet));
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .sub { color: var(--muted); font-size: 14.5px; margin: 0; font-weight: 600; }

  .overall { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;
    margin: 14px 0 4px; font-weight: 800; font-size: 14px; color: var(--muted); }
  .overall b { color: var(--lime); font-size: 17px; }
  .overall .pt { color: var(--cyan); }
  .bar { height: 9px; border-radius: 999px; background: var(--panel-2); overflow: hidden; margin-top: 10px; }
  .bar > i { display: block; height: 100%; width: 0; border-radius: 999px;
    background: linear-gradient(90deg, var(--lime), var(--cyan)); transition: width .4s ease; }

  .hdr-actions { display: flex; gap: 9px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
  .act { cursor: pointer; font-family: var(--font); font-weight: 800; font-size: 13.5px;
    padding: 10px 16px; border-radius: 12px; border: 1px solid var(--brd); background: var(--panel-solid); color: var(--ink);
    transition: transform .1s, border-color .15s, filter .15s; }
  .act:hover { transform: translateY(-1px); border-color: var(--violet); }
  .act:focus-visible { outline: 2px solid var(--violet); outline-offset: 2px; }
  .act.hot { border: none; color: #10071e; background: linear-gradient(100deg, var(--lime), var(--cyan)); }
  .act.hot:hover { filter: brightness(1.06); }

  .testbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 18px 0 4px;
    padding: 10px 12px; border: 1px solid var(--brd); border-radius: 14px; background: var(--panel); }
  .testbar .tb-book { font-weight: 800; font-size: 14px; color: var(--pink); margin-right: 6px; white-space: nowrap; }
  .tb-btn { cursor: pointer; font-family: var(--font); font-weight: 800; font-size: 13.5px; padding: 8px 15px; border-radius: 10px;
    border: 1px solid var(--brd); background: var(--panel-solid); color: var(--ink); transition: transform .1s, border-color .15s, background .15s; }
  .tb-btn:hover { transform: translateY(-1px); border-color: var(--violet); }
  .tb-btn.active { border: none; color: #10203c; background: linear-gradient(100deg, var(--lime), var(--pink)); }
  .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 12px 0 18px; }
  .tab { cursor: pointer; font-family: var(--font); font-weight: 800; font-size: 14px;
    padding: 12px 8px; border-radius: 15px; border: 1px solid var(--brd); background: var(--panel); color: var(--ink);
    position: relative; display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: transform .12s, border-color .15s, background .2s; }
  .tab:hover { transform: translateY(-2px); border-color: var(--violet); }
  .tab:focus-visible { outline: 2px solid var(--violet); outline-offset: 2px; }
  .tab .emo { font-size: 20px; } .tab .lbl { font-size: 12.5px; }
  .tab .mini { font-size: 10.5px; color: var(--muted); font-weight: 700; }
  .tab.active { color: #fff; border: none; background: linear-gradient(120deg, var(--violet), var(--pink));
    box-shadow: 0 12px 26px -12px rgba(255,46,151,0.6); }
  .tab.active .mini { color: rgba(255,255,255,0.85); }
  .tab.done::after { content: "✓"; position: absolute; top: 6px; right: 8px; font-size: 12px; color: var(--good); font-weight: 900; }
  .tab.active.done::after { color: #fff; }

  .sec-title { display: flex; align-items: baseline; gap: 10px; margin: 4px 2px 12px; flex-wrap: wrap; }
  .sec-title h2 { margin: 0; font-size: 20px; font-weight: 900; }
  .sec-title span { color: var(--muted); font-weight: 700; font-size: 14px; }

  .sample-banner { background: linear-gradient(100deg, rgba(255,210,63,0.12), rgba(255,46,151,0.10));
    border: 1px dashed var(--brd); border-radius: 14px; padding: 12px 15px; font-size: 13px; color: var(--muted); margin: 0 0 16px; font-weight: 600; }
  .sample-banner b { color: var(--ink); }

  .player { background: var(--panel-solid); border: 1px solid var(--brd); border-radius: 18px; box-shadow: var(--shadow); padding: 14px 16px; margin: 0 0 16px; }
  .player .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  audio { width: 100%; min-width: 200px; flex: 1; }
  .pick label { cursor: pointer; padding: 9px 13px; border-radius: 11px; font-weight: 800; font-size: 13px;
    color: var(--ink); background: var(--panel-2); border: 1px solid var(--brd); white-space: nowrap; }
  .pick label:hover { border-color: var(--cyan); }
  .pick input { display: none; }
  .anote { font-size: 12.5px; color: var(--pink); margin: 9px 0 0; display: none; font-weight: 700; }
  .anote.show { display: block; }

  .export-row { margin: 0 0 20px; }
  .btn-export { width: 100%; cursor: pointer; font-family: var(--font); font-weight: 800; font-size: 14px;
    padding: 13px; border-radius: 14px; border: 1px dashed var(--cyan); background: var(--panel); color: var(--ink);
    display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: background .15s, transform .1s; }
  .btn-export:hover { background: rgba(34,228,255,0.1); transform: translateY(-1px); }
  .btn-export:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }
  .btn-export small { color: var(--muted); font-weight: 700; }

  .tools-row { display: flex; gap: 9px; margin: 0 0 20px; flex-wrap: wrap; }
  .tools-row .tbtn { flex: 1; min-width: 130px; cursor: pointer; font-family: var(--font); font-weight: 800; font-size: 13.5px;
    padding: 12px; border-radius: 13px; border: 1px solid var(--brd); background: var(--panel-solid); color: var(--ink);
    display: inline-flex; align-items: center; justify-content: center; gap: 7px; transition: transform .1s, border-color .15s, background .15s; }
  .tools-row .tbtn:hover { transform: translateY(-1px); border-color: var(--violet); }
  .tools-row .tbtn.exp { border: 1px dashed var(--cyan); }
  .tools-row .tbtn.exp:hover { background: rgba(34,228,255,0.1); }

  .twrap { padding: 8px 18px 22px; }
  .thint { color: var(--muted); font-size: 12.5px; font-weight: 700; margin: 0 0 12px; }
  .tlist { display: grid; gap: 2px; }
  .tline { position: relative; padding: 9px 12px; border-radius: 9px; cursor: pointer; font-size: 15px; line-height: 1.55; transition: background .12s; }
  .tline:hover { background: var(--panel-2); }
  .tline .tt { color: var(--cyan); font-weight: 800; font-size: 12px; font-variant-numeric: tabular-nums; margin-right: 8px; }
  .tvn { position: absolute; left: 12px; right: 12px; bottom: calc(100% - 3px); z-index: 3; background: var(--violet); color: #fff;
    font-size: 13.5px; font-weight: 600; line-height: 1.4; padding: 8px 11px; border-radius: 10px; box-shadow: var(--shadow);
    opacity: 0; visibility: hidden; transition: opacity .15s; pointer-events: none; }
  .tvn::after { content: ""; position: absolute; left: 20px; top: 100%; border: 6px solid transparent; border-top-color: var(--violet); }
  .tline:hover .tvn, .tline.show .tvn { opacity: 1; visibility: visible; }

  .dwrap { padding: 8px 18px 22px; }
  .dhint { color: var(--muted); font-size: 12.5px; font-weight: 700; margin: 0 0 14px; }
  .dcard { border: 1px solid var(--brd); border-radius: 14px; padding: 13px 14px; margin-bottom: 12px; background: var(--panel); }
  .dtop { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .dtop .dnum { font-weight: 700; font-size: 13px; color: var(--muted); }
  .dplay { cursor: pointer; border: none; font-family: var(--font); font-weight: 800; font-size: 13px; padding: 8px 13px; border-radius: 10px;
    color: #10071e; background: linear-gradient(100deg, var(--lime), var(--cyan)); display: inline-flex; align-items: center; gap: 6px; }
  .dplay:hover { filter: brightness(1.06); }
  .dinput { width: 100%; font-family: var(--font); font-size: 15px; padding: 11px 13px; border-radius: 11px;
    border: 1px solid var(--brd); background: var(--panel-2); color: var(--ink); }
  .dinput:focus-visible { outline: 2px solid var(--violet); outline-offset: 1px; }
  .dbtns { display: flex; gap: 8px; margin-top: 9px; }
  .dbtns button { cursor: pointer; font-family: var(--font); font-weight: 800; font-size: 13px; padding: 9px 13px; border-radius: 10px;
    border: 1px solid var(--brd); background: var(--panel-solid); color: var(--ink); }
  .dbtns .dcheck { border: none; color: #fff; background: linear-gradient(100deg, var(--violet), var(--pink)); }
  .dfb { margin-top: 10px; font-size: 14px; line-height: 1.7; display: none; }
  .dfb.show { display: block; }
  .dfb .ok { color: var(--good); font-weight: 700; }
  .dfb .miss { color: var(--bad); font-weight: 700; text-decoration: underline; }
  .dfb .scoreline { font-weight: 800; margin-bottom: 5px; }

  .qlist { display: grid; gap: 10px; }
  .qcard { text-align: left; width: 100%; cursor: pointer; font-family: var(--font);
    background: var(--panel-solid); border: 1px solid var(--brd); border-radius: 15px;
    padding: 14px 16px; color: var(--ink); display: flex; gap: 13px; align-items: center;
    transition: border-color .15s, transform .1s; }
  .qcard:hover { border-color: var(--pink); transform: translateY(-1px); }
  .qcard:focus-visible { outline: 2px solid var(--violet); outline-offset: 2px; }
  .qnum { flex: none; min-width: 34px; padding: 0 6px; height: 34px; border-radius: 11px; display: grid; place-items: center;
    font-weight: 900; font-size: 14px; color: #fff; background: linear-gradient(120deg, var(--violet), var(--cyan)); white-space: nowrap; }
  .qcard.correct .qnum { background: linear-gradient(120deg, var(--good), var(--lime)); color: #06210f; }
  .qcard.wrong .qnum { background: linear-gradient(120deg, var(--bad), var(--pink)); color: #fff; }
  .qtext { flex: 1; font-weight: 600; font-size: 15px; }
  .qtag { display: block; font-size: 10.5px; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: .07em; margin-top: 3px; }
  .status { flex: none; font-size: 12px; font-weight: 800; }
  .status.c { color: var(--good); } .status.w { color: var(--bad); }
  .chev { color: var(--muted); font-size: 20px; }

  /* vocab */
  .vocab { margin-top: 26px; background: var(--panel-solid); border: 1px solid var(--brd); border-radius: 18px; padding: 18px 18px 20px; box-shadow: var(--shadow); }
  .vocab h3 { margin: 0 0 4px; font-size: 17px; font-weight: 900;
    background: linear-gradient(100deg, var(--lime), var(--cyan)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .vocab .vsub { margin: 0 0 14px; color: var(--muted); font-size: 13px; font-weight: 600; }
  .vgrid { display: grid; gap: 10px; }
  .vcard { border: 1px solid var(--brd); border-radius: 13px; padding: 12px 14px; background: var(--panel); }
  .vw { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-weight: 800; font-size: 15.5px; }
  .vw .ipa { font-weight: 600; color: var(--cyan); font-size: 14px; font-family: "Segoe UI", system-ui; }
  .vw .pos { color: var(--muted); font-weight: 700; font-size: 12.5px; font-style: italic; }
  .vw .say { margin-left: auto; border: none; cursor: pointer; background: var(--panel-2); color: var(--ink);
    width: 30px; height: 30px; border-radius: 9px; font-size: 15px; }
  .vw .say:hover { background: rgba(34,228,255,0.2); }
  .vvn { margin-top: 4px; font-weight: 700; font-size: 14px; }
  .vex { margin-top: 3px; color: var(--muted); font-size: 13.5px; font-style: italic; }
  .vocab h4 { margin: 20px 0 8px; font-size: 14px; font-weight: 900; color: var(--pink); }
  .structs { margin: 0; padding-left: 0; list-style: none; display: grid; gap: 8px; }
  .structs li { border-left: 3px solid var(--violet); padding: 4px 0 4px 12px; font-size: 14px; }
  .structs li b { color: var(--ink); }
  .structs li span { color: var(--muted); }
  .structs li .sex { display: block; margin-top: 3px; color: var(--pink); font-style: italic; font-size: 13.5px; }
  .vdetails { border: 1px solid var(--brd); border-radius: 13px; background: var(--panel); overflow: hidden; }
  .vdetails > summary { cursor: pointer; list-style: none; padding: 13px 15px; display: flex; align-items: center; gap: 10px;
    font-weight: 800; font-size: 15.5px; color: var(--ink); }
  .vdetails > summary::-webkit-details-marker { display: none; }
  .vdetails > summary::after { content: "▾"; margin-left: auto; color: var(--muted); transition: transform .2s; }
  .vdetails[open] > summary::after { transform: rotate(180deg); }
  .vdetails > summary .vhint2 { font-size: 11.5px; font-weight: 700; color: var(--pink); background: var(--panel-2); padding: 3px 9px; border-radius: 999px; }
  .vdetails[open] > summary .vhint2 { display: none; }
  .vdetails .vsub { padding: 0 15px; }
  .vdetails .vgrid { padding: 4px 15px 15px; }

  /* ===== EXAM MODE — giống phuquocielts.vn (computer-delivered) ===== */
  .examact { border-color: #16243d !important; }
  body.exammode { background: #ffffff !important; }
  body.exammode .wrap { max-width: 100%; padding: 0; }
  body.exammode > .wrap > header, body.exammode .tabs, body.exammode .testbar, body.exammode > .wrap > footer { display: none; }
  body.exammode { font-family: Arial, Helvetica, sans-serif; }

  .exam-top { position: fixed; top: 0; left: 0; right: 0; height: 46px; background: #17253f; color: #fff;
    display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0 16px; z-index: 46; }
  .et-user { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; white-space: nowrap; }
  .et-user .ava { width: 22px; height: 22px; border-radius: 50%; background: #33445f; display: grid; place-items: center; font-size: 12px; }
  .et-timer { font-weight: 700; font-size: 16px; color: #d3e021; font-variant-numeric: tabular-nums; }
  .et-timer.low { color: #ff6b6b; animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: .5; } }
  .et-ctrl { display: flex; align-items: center; gap: 10px; }
  .vspk { background: none; border: none; color: #fff; cursor: pointer; font-size: 17px; padding: 0; }
  .vslider { width: 120px; accent-color: #6ea8e0; cursor: pointer; }
  .pick2 label { cursor: pointer; background: #33445f; color: #fff; border-radius: 5px; padding: 4px 8px; font-size: 13px; }
  .pick2 input { display: none; }
  .gear { background: none; border: none; color: #fff; cursor: pointer; font-size: 15px; opacity: .85; padding: 0; }

  .exam-parthead { position: fixed; top: 46px; left: 0; right: 0; height: 48px; background: #fff; border-bottom: 1px solid #e2e6ea;
    display: flex; align-items: center; padding: 0 22px; z-index: 44; font-weight: 700; font-size: 18px; color: #1a1a1a; box-shadow: 0 1px 4px rgba(0,0,0,.05); }

  .exam-audiobar { position: fixed; top: 94px; left: 0; right: 0; height: 52px; background: #eef1f5; border-bottom: 1px solid #d5dade;
    display: flex; align-items: center; gap: 14px; padding: 0 20px; z-index: 43; }
  .exam-audiobar .ab-label { font-weight: 700; font-size: 13px; color: #333; white-space: nowrap; }
  .exam-audiobar audio { height: 36px; flex: 1; max-width: 560px; min-width: 180px; }
  .exam-audiobar .pick2 label { background: #17253f; color: #fff; border-radius: 6px; padding: 8px 13px; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .exam-audiobar .pick2 input { display: none; }
  #homeBtn { font-size: 13px; font-weight: 700; }
  .exam-main { padding: 170px 34px 92px; background: #fff; color: #111; min-height: 100vh; }
  @media (max-width: 620px) { .exam-audiobar { height: 46px; gap: 8px; padding: 0 12px; } .exam-audiobar .ab-label { display: none; } .exam-main { padding-top: 168px; } }
  .exam-instr { font-size: 15px; margin-bottom: 20px; line-height: 1.55; color: #111; }
  .eqgrid { display: grid; grid-template-columns: 1fr; gap: 6px 56px; }
  @media (min-width: 900px) { .eqgrid.two { grid-template-columns: 1fr 1fr; } }
  .eq { padding: 14px 0 18px; }
  .eqh { font-size: 16px; line-height: 1.45; margin-bottom: 12px; display: flex; align-items: flex-start; gap: 8px; }
  .eqh .qlabel { font-weight: 700; white-space: nowrap; }
  .eqh .eqt { flex: 1; }
  .flagbtn { flex: none; margin-left: 6px; border: 1px solid #ccc; background: #fff; border-radius: 5px; cursor: pointer; font-size: 14px; padding: 1px 7px; color: #555; }
  .flagbtn:hover { border-color: #e67e22; background: #fff7f0; }
  .eopts { display: grid; gap: 11px; padding-left: 8px; }
  .eopt { display: flex; align-items: flex-start; gap: 11px; font-size: 15px; color: #111; cursor: pointer; line-height: 1.4; }
  .eopt:hover { color: #17253f; }
  .eopt input { accent-color: #17253f; width: 16px; height: 16px; flex: none; margin-top: 2px; }
  .eopt .el { font-weight: 400; min-width: 18px; }
  .eqt em { color: #c0392b; font-style: italic; font-weight: 700; }
  .eopts.letters { display: flex; gap: 10px; flex-wrap: wrap; }
  .eopts.letters .eopt.lt { border: 1px solid #b9c1c9; border-radius: 6px; padding: 8px 16px; gap: 7px; }
  .eopts.letters .eopt.lt:hover { border-color: #2e6da4; background: #eef5fd; }
  .eopts.letters .eopt.lt .el { font-weight: 700; }
  .match-legend { border: 1px solid #d5dade; background: #f6f8fb; border-radius: 8px; padding: 13px 16px; margin: 4px 0 16px; }
  .match-legend .ml-intro { font-weight: 700; margin: 0 0 9px; font-size: 15px; }
  .match-legend ul { margin: 0; padding: 0; list-style: none; display: grid; gap: 5px; font-size: 14px; }
  .match-legend li b { display: inline-block; width: 20px; }
  .eq.match { padding: 12px 0 14px; border-bottom: 1px solid #eef1f3; }

  .exam-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #d3d9de;
    padding: 8px 12px; z-index: 46; display: flex; align-items: center; gap: 10px; overflow-x: auto; }
  .review-chk { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: #333; white-space: nowrap; cursor: pointer; }

<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };

  var APP = JSON.parse($('appdata').textContent);
  var AUDIO_BASE = '';   // khi host: MP3 nằm cùng thư mục với index.html (thư mục gốc repo)
  // Quyển (book) → tests → sections. Tương thích ngược file cũ (chỉ có "sections").
  var TESTS = APP.tests || [{ id: 1, name: 'Test', sections: APP.sections || [] }];
  var TID = 0;                          // Test đang chọn
  var SECTIONS = TESTS[TID].sections;
  var SINGLE = SECTIONS.length === 1;   // hiếm: file chỉ 1 section
  var STUDENT = APP.student === true;   // file đã xuất cho học sinh → ẩn nút Export

  // IELTS chuẩn: mỗi phần 10 câu. Section mẫu tự sinh 10 câu + placeholder.
  function mkSample(n) {
    return { n: n, tag: "Sample", q: "Sample question " + n + " — replace with your real question",
      opts: ["Option A", "Option B (correct answer)", "Option C"], answer: 1,
      proof: "The supporting quote for question " + n + " appears here, *with the key part highlighted*.",
      proofVN: "Bản dịch tiếng Việt minh hoạ cho câu " + n + ".", start: "0:30", end: "0:42" };
  }
  TESTS.forEach(function (t) {
    t.sections.forEach(function (s) {
      if (s.sample) {
        var base = (s.id - 1) * 10 + 1, qs = []; for (var i = 0; i < 10; i++) qs.push(mkSample(base + i)); s.questions = qs;
        if (!s.vocab) s.vocab = [{ w: "(sample word)", ipa: "/wɜːd/", pos: "(n)", vn: "nghĩa tiếng Việt", ex: "An example sentence." }];
        if (!s.structures) s.structures = [{ s: "(sample structure)", vn: "nghĩa cấu trúc" }];
        if (!s.transcript) s.transcript = [{ t: "0:20", en: "Sample transcript line — replace with your own.", vn: "Dòng transcript mẫu." }];
        if (!s.dictation) s.dictation = [{ t: "0:20", end: "0:26", text: "This is a sample dictation sentence." }];
      }
    });
  });

  var active = SECTIONS.length > 1 ? 1 : 0;
  var answers = {};
  var flags = {};
  var currentKey = null;
  var MODE = 'study';           // 'study' | 'exam'
  var examTimer = null, examLeft = 0;
  var audio = null;

  var kick = $('kicker'); if (kick) kick.textContent = '🎧 ' + (APP.title || 'IELTS Listening');

  function switchTest(i) {
    if (i === TID) return;
    TID = i; SECTIONS = TESTS[TID].sections; SINGLE = SECTIONS.length === 1; active = SECTIONS.length > 1 ? 1 : 0;
    currentKey = null; MODE = 'study'; stopTimer(); render();
    showToast('📘 ' + (APP.title || '') + ' · ' + TESTS[TID].name);
  }
  function buildTestBar() {
    var el = $('testbar'); if (!el) return;
    if (TESTS.length <= 1 || MODE === 'exam') { el.style.display = 'none'; return; }
    el.style.display = '';
    el.innerHTML = '<span class="tb-book">📘 ' + esc(APP.title || 'Book') + '</span>' +
      TESTS.map(function (t, i) { return '<button class="tb-btn' + (i === TID ? ' active' : '') + '" data-i="' + i + '">' + esc(t.name) + '</button>'; }).join('');
    el.querySelectorAll('.tb-btn').forEach(function (b) { b.onclick = function () { switchTest(+b.getAttribute('data-i')); }; });
  }

  // ----- cell helpers -----
  function key(s, c) { var b = c.multi ? ('M' + s.id + ':' + c.ns.join('-')) : (s.id + ':' + c.n); return TESTS[TID].id + '/' + b; }
  function cellNums(c) { return c.multi ? c.ns : [c.n]; }
  function cellMax(c) { return c.multi ? c.ns.length : 1; }
  function cellCorrect(c, chosen) {
    if (c.multi) { if (!Array.isArray(chosen)) return 0; return chosen.filter(function (i) { return c.answer.indexOf(i) >= 0; }).length; }
    return chosen === c.answer ? 1 : 0;
  }
  function cellDoneNums(c, chosen) {
    if (c.multi) return Array.isArray(chosen) ? Math.min(chosen.length, c.pick) : 0;
    return chosen != null ? 1 : 0;
  }
  function toSec(m) { var p = m.split(':'); return +p[0] * 60 + +p[1]; }
  function addSec(m, n) { var t = toSec(m) + n, mm = Math.floor(t / 60), ss = t % 60; return mm + ':' + (ss < 10 ? '0' + ss : ss); }
  function esc(t) { return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function renderProof(t) { return esc(t).replace(/\*(.+?)\*/g, '<mark>$1</mark>'); }
  function secTotal(s) { var n = 0; s.questions.forEach(function (c) { n += cellMax(c); }); return n; }
  function totalQ() { var n = 0; SECTIONS.forEach(function (s) { n += secTotal(s); }); return n; }
  function answeredCount() { var n = 0; SECTIONS.forEach(function (s) { s.questions.forEach(function (c) { n += cellDoneNums(c, answers[key(s, c)]); }); }); return n; }
  function rightCount() { var r = 0; SECTIONS.forEach(function (s) { s.questions.forEach(function (c) { r += cellCorrect(c, answers[key(s, c)]); }); }); return r; }
  function secAnswered(s) { var n = 0; s.questions.forEach(function (c) { n += cellDoneNums(c, answers[key(s, c)]); }); return n; }
  function secDone(s) { return secAnswered(s) === secTotal(s); }

  function buildTabs() {
    if (SINGLE) return;
    var t = $('tabs'); t.innerHTML = '';
    SECTIONS.forEach(function (s, i) {
      var b = document.createElement('button');
      b.className = 'tab' + (i === active ? ' active' : '') + (secDone(s) ? ' done' : '');
      b.innerHTML = '<span class="emo">' + s.emoji + '</span><span class="lbl">' + s.name + '</span><span class="mini">' + secAnswered(s) + '/' + secTotal(s) + '</span>';
      b.onclick = function () { active = i; render(); };
      t.appendChild(b);
    });
  }

  function render() {
    buildTestBar();
    buildTabs();
    var s = SECTIONS[active];
    document.body.classList.toggle('exammode', MODE === 'exam');
    if (MODE === 'exam') { renderExam(s); return; }
    renderStudy(s);
  }

  function renderStudy(s) {
    var hasEmbedded = !!s.audioData;
    $('sectionArea').innerHTML =
      '<div class="sec-title"><h2>' + s.emoji + ' ' + s.name + '</h2><span>' + s.topic + '</span></div>' +
      (s.sample && !SINGLE ? '<div class="sample-banner">✏️ <b>This section is a sample.</b> Send the questions + answers + tapescript (with timestamps) + MP3 for Section ' + s.id + ' and it will be filled with the real content.</div>' : '') +
      '<div class="player"><div class="row"><audio id="audio" controls preload="metadata"></audio>' +
      (hasEmbedded ? '' : '<span class="pick"><label for="file">📂 Choose MP3</label><input id="file" type="file" accept="audio/*"></span>') +
      '</div>' + (hasEmbedded ? '' : '<p id="anote" class="anote"><b>' + s.audioFile + '</b> not found. Click “Choose MP3” to load the audio for this section (works offline).</p>') + '</div>' +
      '<div class="tools-row">' +
        '<button class="tbtn" id="btnTrans">📄 Transcript</button>' +
        '<button class="tbtn" id="btnDict">✍️ Dictation</button>' +

    audio.addEventListener('play', function () { var a = $('anote'); if (a) a.classList.remove('show'); });
    audio.addEventListener('timeupdate', function () { if (s._stopAt != null && audio.currentTime >= s._stopAt) { audio.pause(); s._stopAt = null; } });

    var fp = $('file');
    if (fp) fp.addEventListener('change', function (e) {
      var f = e.target.files && e.target.files[0]; if (!f) return;

    var ql = $('qlist');

      var chosen = answers[key(s, item)];

      var st = !done ? '' : (full ? 'correct' : 'wrong');
      var label = item.multi ? item.ns.join('–') : item.n;
      var b = document.createElement('button');
      b.className = 'qcard' + (st ? ' ' + st : '') + (item.multi ? ' wide' : ''); b.setAttribute('data-i', idx);
      var badge = st === 'correct' ? '<span class="status c">✓ Correct</span>' : st === 'wrong' ? '<span class="status w">✗ Check</span>' : '';
      b.innerHTML = '<span class="qnum">' + label + '</span><span class="qtext">' + esc(item.q) + '<span class="qtag">' + item.tag + '</span></span>' + badge + '<span class="chev">›</span>';
      b.onclick = function () { openModal(s, item); };
      ql.appendChild(b);
    });

    bindSpeak();
    updateOverall();
  }

  function renderVocab(s) {
    if (!s.vocab || !s.vocab.length) return '';
    var cards = s.vocab.map(function (v) {
      return '<div class="vcard"><div class="vw">' + esc(v.w) +
        (v.ipa ? ' <span class="ipa">' + esc(v.ipa) + '</span>' : '') +
        (v.pos ? ' <span class="pos">' + esc(v.pos) + '</span>' : '') +
        '<button class="say" data-say="' + encodeURIComponent(v.w) + '" title="Listen" aria-label="Listen to pronunciation">🔈</button></div>' +
        '<div class="vvn">' + esc(v.vn) + '</div>' +
        (v.ex ? '<div class="vex">“' + esc(v.ex) + '”</div>' : '') + '</div>';
    }).join('');
    var structs = (s.structures || []).map(function (x) {
      return '<li><b>' + esc(x.s) + '</b> <span>— ' + esc(x.vn) + '</span>' +
        (x.ex ? '<span class="sex">e.g. “' + esc(x.ex) + '”</span>' : '') + '</li>';
    }).join('');
    return '<div class="vocab">' +
      '<details class="vdetails"><summary><span class="vhead">🧠 Vocabulary &amp; Collocations</span><span class="vhint2">click to show</span></summary>' +
      '<p class="vsub">Click 🔈 to hear the pronunciation · learn with IPA and examples</p>' +

      (structs ? '<h4>🧩 Useful sentence structures</h4><ul class="structs">' + structs + '</ul>' : '') +

  function bindSpeak() {
    document.querySelectorAll('[data-say]').forEach(function (b) {
      b.onclick = function () {
        var w = decodeURIComponent(b.getAttribute('data-say'));
        if ('speechSynthesis' in window) {
          try { speechSynthesis.cancel(); var u = new SpeechSynthesisUtterance(w); u.lang = 'en-US'; u.rate = .9; speechSynthesis.speak(u); }
          catch (e) { showToast('Your browser does not support text-to-speech'); }
        } else { showToast('Your browser does not support text-to-speech'); }
      };
    });
  }

  function updateOverall() {
    var done = answeredCount(), total = totalQ();
    $('ovDone').textContent = done; $('ovTotal').textContent = total; $('ovRight').textContent = rightCount();
    $('ovBar').style.width = (total ? done / total * 100 : 0) + '%';
  }

  /* ===== EXAM MODE — giống phuquocielts.vn ===== */
  function qByN(s, n) { for (var i = 0; i < s.questions.length; i++) if (s.questions[i].n === n) return s.questions[i]; }
  function parseKey(kk) { var sec = null, item = null;
    SECTIONS.forEach(function (x) { x.questions.forEach(function (c) { if (key(x, c) === kk) { sec = x; item = c; } }); });
    return { s: sec, item: item }; }
  function flatKeys() { var arr = []; SECTIONS.forEach(function (sec) { sec.questions.forEach(function (item) { arr.push(key(sec, item)); }); }); return arr; }

  function cellByKey(k) { var out = null; SECTIONS.forEach(function (x) { x.questions.forEach(function (c) { if (key(x, c) === k) out = c; }); }); return out; }

  function examCell(s, cell) {
    var k = key(s, cell), chosen = answers[k], anchor = 'eq' + cellNums(cell)[0];
    var flag = '<button class="flagbtn" data-k="' + k + '" title="Mark for review">' + (flags[k] ? '🚩' : '⚑') + '</button>';
    if (cell.multi) {
      var boxes = cell.opts.map(function (o, i) {
        var L = String.fromCharCode(65 + i), ck = Array.isArray(chosen) && chosen.indexOf(i) >= 0;
        return '<label class="eopt"><input type="checkbox" data-k="' + k + '" value="' + i + '"' + (ck ? ' checked' : '') + '><span class="el">' + L + '.</span><span>' + esc(o) + '</span></label>';
      }).join('');
      return '<div class="eq" id="' + anchor + '" data-k="' + k + '"><div class="eqh"><span class="qlabel">' + cell.ns.join(' & ') +
        '</span><span class="eqt">' + esc(cell.q) + ' <em>(Choose ' + numWord(cell.pick) + ')</em></span>' + flag + '</div><div class="eopts">' + boxes + '</div></div>';
    }
    if (cell.match) {
      var head = '';
      if (cell.groupHead) {
        var leg = cell.legend.map(function (o, i) { return '<li><b>' + String.fromCharCode(65 + i) + '</b> ' + esc(o) + '</li>'; }).join('');
        head = '<div class="match-legend">' + (cell.intro ? '<p class="ml-intro">' + esc(cell.intro) + '</p>' : '') + '<ul>' + leg + '</ul></div>';
      }
      var lets = cell.opts.map(function (o, i) {
        var L = String.fromCharCode(65 + i);
        return '<label class="eopt lt" title="' + esc(o) + '"><input type="radio" name="' + anchor + '" data-k="' + k + '" value="' + i + '"' + (chosen === i ? ' checked' : '') + '><span class="el">' + L + '</span></label>';
      }).join('');
      return head + '<div class="eq match" id="' + anchor + '" data-k="' + k + '"><div class="eqh"><span class="qlabel">' + cell.n +
        '</span><span class="eqt">' + esc(cell.q) + '</span>' + flag + '</div><div class="eopts letters">' + lets + '</div></div>';
    }
    var radios = cell.opts.map(function (o, i) {
      var L = String.fromCharCode(65 + i);
      return '<label class="eopt"><input type="radio" name="' + anchor + '" data-k="' + k + '" value="' + i + '"' + (chosen === i ? ' checked' : '') + '><span class="el">' + L + '.</span><span>' + esc(o) + '</span></label>';
    }).join('');
    return '<div class="eq" id="' + anchor + '" data-k="' + k + '"><div class="eqh"><span class="qlabel">Question ' + cell.n + ':</span>' +
      '<span class="eqt">' + esc(cell.q) + '</span>' + flag + '</div><div class="eopts">' + radios + '</div></div>';
  }

  function renderExam(s) {
    var qs = s.questions, allNums = []; qs.forEach(function (c) { allNums = allNums.concat(cellNums(c)); });
    var first = allNums[0], last = allNums[allNums.length - 1];
    var hasEmbedded = !!s.audioData;
    if (!currentKey || !parseKey(currentKey).s) currentKey = key(s, qs[0]);

    var body = qs.map(function (cell) { return examCell(s, cell); }).join('');

    $('sectionArea').innerHTML =
      '<div class="exam-top">' +
        '<div class="et-user"><span class="ava">👤</span> Student</div>' +
        '<div class="et-timer" id="timer">--:--</div>' +
        '<div class="et-ctrl"><button class="gear" id="homeBtn" title="Home">🏠 Home</button>' +
          '<button class="gear" title="Settings">⚙</button></div>' +
      '</div>' +
      '<div class="exam-parthead">Part ' + s.id + ': Questions ' + first + ' – ' + last + '</div>' +
      '<div class="exam-audiobar"><span class="ab-label">🎧 Recording</span>' +
        '<audio id="audio" controls preload="metadata"></audio>' +
        (hasEmbedded ? '' : '<span class="pick2"><label for="file" title="Load MP3">📂 Load MP3</label><input id="file" type="file" accept="audio/*"></span>') +
      '</div>' +
      '<div class="exam-main">' + body + '</div>' +
      '<div class="exam-bottom" id="exBottom"></div>';

    audio = $('audio'); audio.src = s._blob || s.audioData || (AUDIO_BASE + s.audioFile); audio.load();
    wireExamAudio(s, hasEmbedded);
    var goHome = function () { stopTimer(); MODE = 'study'; render(); showToast('🏠 Back to home — your answers are kept.'); };
    var hb = $('homeBtn'); if (hb) hb.onclick = goHome;
    var g = document.querySelector('.gear:not(#homeBtn)'); if (g) g.onclick = goHome;

    $('sectionArea').querySelectorAll('.eopts input[type=radio]').forEach(function (inp) {
      inp.addEventListener('change', function () { var k = inp.getAttribute('data-k'); answers[k] = +inp.value; currentKey = k; buildBottom(); });
    });
    $('sectionArea').querySelectorAll('.eopts input[type=checkbox]').forEach(function (inp) {
      inp.addEventListener('change', function () {
        var k = inp.getAttribute('data-k'), cell = cellByKey(k);
        var boxes = inp.closest('.eopts').querySelectorAll('input[type=checkbox]');
        var checked = []; boxes.forEach(function (b) { if (b.checked) checked.push(+b.value); });
        if (cell && checked.length > cell.pick) { inp.checked = false; checked = checked.filter(function (v) { return v !== +inp.value; }); }
        answers[k] = checked.sort(function (a, b) { return a - b; }); currentKey = k; buildBottom();
      });
    });
    $('sectionArea').querySelectorAll('.flagbtn').forEach(function (b) {
      b.onclick = function () { var k = b.getAttribute('data-k'); flags[k] = !flags[k]; b.textContent = flags[k] ? '🚩' : '⚑'; currentKey = k; buildBottom(); };
    });

    buildBottom();
    renderTimer();
  }

  function wireExamAudio(s, hasEmbedded) {
    var spk = $('vspk');
    if (spk) spk.onclick = function () {
      if (audio.paused) { var p = audio.play(); if (p && p.catch) p.catch(function () { showToast('No MP3 yet — click 📂 to load the audio'); }); }
      else audio.pause();
    };
    audio.addEventListener('pause', function () { if ($('vspk')) $('vspk').textContent = '🔊'; });
    audio.addEventListener('play', function () { if ($('vspk')) $('vspk').textContent = '⏸'; });
    var sl = $('vslider'); if (sl) sl.oninput = function () { audio.volume = +sl.value; };
    var fp = $('file');
    if (fp) fp.addEventListener('change', function (e) { var f = e.target.files && e.target.files[0]; if (!f) return;
      s._file = f; var u = URL.createObjectURL(f); s._blob = u; audio.src = u; audio.load(); });
  }

  function buildBottom() {
    var el = $('exBottom'); if (!el) return;
    var cur = parseKey(currentKey);
    var groups = SECTIONS.map(function (sec) {
      var nums = sec.questions.map(function (cell) {
        var k = key(sec, cell), chosen = answers[k];
        var filled = cell.multi ? (Array.isArray(chosen) && chosen.length === cell.pick) : (chosen != null);
        return cellNums(cell).map(function (nn) {
          var cls = 'pnum' + (filled ? ' answered' : '') + (flags[k] ? ' flag' : '') + (k === currentKey ? ' current' : '');
          return '<button class="' + cls + '" data-k="' + k + '">' + nn + '</button>';
        }).join('');
      }).join('');
      return '<div class="pgroup"><span class="plabel2">Part ' + sec.id + ':</span>' + nums + '</div>';
    }).join('');
    el.innerHTML =
      '<label class="review-chk"><input type="checkbox" id="reviewChk"> Review</label>' + groups +
      '<div class="exam-nav-right">' +
        '<button class="collapse-ic" id="colBtn" title="Collapse / expand">⤢</button>' +
        '<button class="navarrow" id="prevQ" title="Previous">←</button>' +
        '<button class="navarrow" id="nextQ" title="Next">→</button>' +
        '<button class="submit-ex" id="btnSubmit">Submit</button></div>';

    el.querySelectorAll('.pnum').forEach(function (b) { b.onclick = function () { gotoKey(b.getAttribute('data-k')); }; });
    var rc = $('reviewChk'); rc.checked = !!flags[currentKey];
    rc.onchange = function () { flags[currentKey] = rc.checked; var fb = document.querySelector('.flagbtn[data-k="' + currentKey + '"]'); if (fb) fb.textContent = rc.checked ? '🚩' : '⚑'; buildBottom(); };
    $('prevQ').onclick = function () { navRel(-1); };
    $('nextQ').onclick = function () { navRel(1); };
    $('btnSubmit').onclick = openSubmit;
    $('colBtn').onclick = function () { document.body.classList.toggle('nav-collapsed'); };
  }

  function gotoKey(kk) {
    var r = parseKey(kk); if (!r.s) return;
    currentKey = kk;
    if (SECTIONS[active].id !== r.s.id) { active = SECTIONS.indexOf(r.s); render(); }
    else buildBottom();
    setTimeout(function () { var el = $('eq' + cellNums(r.item)[0]); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 40);
  }
  function navRel(d) { var arr = flatKeys(), i = arr.indexOf(currentKey); if (i < 0) i = 0;
    gotoKey(arr[Math.min(arr.length - 1, Math.max(0, i + d))]); }

  function startExam() {
    examLeft = (APP.examMinutes || 30) * 60;
    stopTimer(); renderTimer();
    examTimer = setInterval(function () {
      examLeft--; renderTimer();
      if (examLeft <= 0) { stopTimer(); alert('⏰ Time is up! Your test will be submitted.'); doSubmit(); }
    }, 1000);
  }
  function stopTimer() { if (examTimer) { clearInterval(examTimer); examTimer = null; } }
  function renderTimer() { var t = $('timer'); if (!t) return;
    var m = Math.floor(examLeft / 60), sc = examLeft % 60;
    t.textContent = m + ' minute' + (m === 1 ? '' : 's') + ' ' + (sc < 10 ? '0' : '') + sc + 's left';
    if (examLeft > 60) t.textContent = m + ' minutes left';
    t.classList.toggle('low', examLeft <= 120); }

  function openSubmit() { $('examSubmit').classList.add('show'); }
  function doSubmit() { $('examSubmit').classList.remove('show'); stopTimer(); MODE = 'study'; render(); openResults(); }

  function numWord(n) { return ({ 1: 'ONE', 2: 'TWO', 3: 'THREE', 4: 'FOUR' })[n] || ('' + n); }

  function openModal(s, item) {
    var multi = !!item.multi, k = key(s, item), answered = answers[k] != null;
    $('mNum').textContent = multi ? item.ns.join('–') : item.n;
    $('mTitle').textContent = s.name + ' · ' + (multi ? 'Questions ' + item.ns.join(' & ') : 'Question ' + item.n);

    var opts = item.opts.map(function (o, i) {
      var L = String.fromCharCode(65 + i);
      return '<button class="optbtn' + (multi ? ' multi' : '') + '" data-i="' + i + '"><span class="letter">' + L + '</span><span>' + esc(o) + '</span></button>';
    }).join('');
    var intro = (item.intro ? '<p class="q-intro">' + esc(item.intro) + '</p>' : '');
    var hint = multi ? '👆 Choose ' + numWord(item.pick) + ' answers, then press Check' : '👆 Choose the answer you think is correct';
    var checkBtn = multi ? '<button class="checkbtn" id="checkBtn" disabled>✅ Check answer</button>' : '';

    $('mBody').innerHTML =
      intro +
      '<p class="q-full">' + esc(item.q) + '</p>' +
      '<p class="pickhint" id="pickhint">' + hint + '</p>' +
      '<div class="opts" id="opts">' + opts + '</div>' + checkBtn +
      '<p class="result-flag" id="flag"></p>' +
      '<div class="proofWrap" id="proofWrap">' +
        '<p class="plabel">🔎 Evidence in the recording</p>' +
        '<div class="proof" id="proofBox" title="Click to play this part">' + renderProof(item.proof) +
        '<span class="cue">👆 Click to listen · ⏱ <span class="ts">' + item.start + ' → ' + item.end + '</span></span></div>' +
        '<div class="row2"><button class="xlate" id="xlateBtn">🌐 Translate</button></div>' +
        '<div class="proofVN" id="proofVN"><b>Meaning:</b> ' + esc(item.proofVN || '(no translation yet)') + '</div>' +
        '<button class="listen" id="listenBtn">🔊 Play this part <span class="ts">(' + item.start + '–' + item.end + ')</span></button>' +
        (item.analysis ? '<div class="analysis"><p class="alabel">💡 Trap &amp; paraphrase analysis</p><div class="atext">' + renderProof(item.analysis) + '</div>' +
          (item.analysisVN ? '<div class="row2"><button class="xlate" id="xlateA">🌐 Translate</button></div><div class="proofVN" id="analysisVN"><b>Nghĩa:</b> ' + esc(item.analysisVN) + '</div>' : '') +
          '</div>' : '') +
      '</div>';

    if (multi) {
      var sel = [];
      $('opts').querySelectorAll('.optbtn').forEach(function (el) {
        el.onclick = function () {
          if (answers[k] != null) return;
          var i = +el.getAttribute('data-i'), pos = sel.indexOf(i);
          if (pos >= 0) { sel.splice(pos, 1); el.classList.remove('sel'); }
          else { if (sel.length >= item.pick) return; sel.push(i); el.classList.add('sel'); }
          $('checkBtn').disabled = sel.length !== item.pick;
        };
      });
      $('checkBtn').onclick = function () { if (answers[k] != null) return; answers[k] = sel.slice().sort(function (a, b) { return a - b; }); afterPick(s, item, k); };
    } else {
      $('opts').querySelectorAll('.optbtn').forEach(function (el) {
        el.onclick = function () { if (answers[k] != null) return; answers[k] = +el.getAttribute('data-i'); afterPick(s, item, k); };
      });
    }

    var play = function () { playSeg(s, item.start, item.end); };
    $('proofBox').onclick = play; $('listenBtn').onclick = play;
    $('xlateBtn').onclick = function () {
      var vn = $('proofVN'); var on = vn.classList.toggle('show');
      $('xlateBtn').textContent = on ? '🌐 Hide translation' : '🌐 Translate';
    };
    var xa = $('xlateA');
    if (xa) xa.onclick = function () { var el = $('analysisVN'); var on = el.classList.toggle('show'); xa.textContent = on ? '🌐 Hide translation' : '🌐 Translate'; };

    if (answered) grade(s, item);
    $('overlay').classList.add('open'); $('mClose').focus();
  }

  function afterPick(s, item, k) {
    grade(s, item); updateOverall(); buildTabs();
    var idx = s.questions.indexOf(item), card = document.querySelector('.qcard[data-i="' + idx + '"]');
    if (card) { card.classList.remove('correct', 'wrong'); card.classList.add(cellCorrect(item, answers[k]) === cellMax(item) ? 'correct' : 'wrong'); }
    if (secDone(s)) { showToast('🎉 ' + s.name + ' done! Click “View results”'); burst(); }
  }

  function grade(s, item) {
    var k = key(s, item), chosen = answers[k], flag = $('flag');
    $('opts').querySelectorAll('.optbtn').forEach(function (el) {
      var i = +el.getAttribute('data-i'); el.disabled = true; el.classList.remove('sel');
      var isAns = item.multi ? item.answer.indexOf(i) >= 0 : i === item.answer;
      var isChosen = item.multi ? (Array.isArray(chosen) && chosen.indexOf(i) >= 0) : i === chosen;
      if (isAns) el.classList.add('correct'); else if (isChosen) el.classList.add('wrong'); else el.classList.add('dim');
    });
    var cc = cellCorrect(item, chosen), mx = cellMax(item);
    if (cc === mx) { flag.className = 'result-flag ok show'; flag.textContent = '✅ Correct!' + (mx > 1 ? ' (' + cc + '/' + mx + ')' : ''); }
    else { flag.className = 'result-flag no show'; flag.textContent = mx > 1 ? ('❌ ' + cc + '/' + mx + ' correct.') : '❌ Not quite.'; }
    var cb = $('checkBtn'); if (cb) cb.style.display = 'none';
    $('pickhint').style.display = 'none';
    $('proofWrap').classList.add('show');
  }

  function playSeg(s, start, end) {
    if (!audio || !audio.currentSrc) { var a = $('anote'); if (a) a.classList.add('show'); showToast('🔇 No MP3 yet — please load the audio'); return; }
    s._stopAt = toSec(end);
    try { audio.currentTime = toSec(start); var p = audio.play();
      if (p && p.catch) p.catch(function () { showToast('Click ▶ on the player once, then try again'); });
      showToast('🎧 Playing ' + start + ' → ' + end);
    } catch (e) { showToast('Could not play this segment'); }
  }

  function closeModal() { $('overlay').classList.remove('open'); if (audio) audio.pause(); }
  $('mClose').onclick = closeModal;
  $('overlay').onclick = function (e) { if (e.target === $('overlay')) closeModal(); };

  /* ---- Transcript (hover to show Vietnamese) ---- */
  function openTranscript(s) {
    var lines = s.transcript || [];
    var body = lines.map(function (ln, i) {
      var t = ln.t ? '<span class="tt">' + ln.t + '</span>' : '';
      return '<div class="tline" data-i="' + i + '"' + (ln.t ? ' data-t="' + ln.t + '"' : '') + '>' +
        '<div class="tvn">🇻🇳 ' + esc(ln.vn || '') + '</div>' + t + esc(ln.en) + '</div>';
    }).join('');
    $('transTitle').textContent = s.name + ' · Transcript';
    $('transBody').innerHTML = '<div class="twrap"><p class="thint">🖱️ Hover (or tap) a line to show the Vietnamese meaning · click to play from that line</p><div class="tlist">' +
      (lines.length ? body : '<p class="thint">This section has no transcript yet.</p>') + '</div></div>';
    $('transBody').querySelectorAll('.tline').forEach(function (el) {
      el.onclick = function () {
        el.classList.toggle('show');
        var t = el.getAttribute('data-t'); if (!t) return;
        var i = +el.getAttribute('data-i'); var next = lines[i + 1];
        playSeg(s, t, next && next.t ? next.t : addSec(t, 6));
      };
    });
    $('transOverlay').classList.add('open'); $('transClose').focus();
  }
  $('transClose').onclick = function () { $('transOverlay').classList.remove('open'); if (audio) audio.pause(); };
  $('transOverlay').onclick = function (e) { if (e.target === $('transOverlay')) { $('transOverlay').classList.remove('open'); if (audio) audio.pause(); } };

  /* ---- Dictation ---- */
  function normWords(str) { return str.toLowerCase().replace(/[^a-z0-9\s']/g, ' ').replace(/\s+/g, ' ').trim(); }
  function openDictation(s) {
    var items = s.dictation || [];
    var body = items.map(function (d, i) {
      return '<div class="dcard" data-i="' + i + '">' +
        '<div class="dtop"><button class="dplay" data-i="' + i + '">▶ Play sentence ' + (i + 1) + '</button><span class="dnum">Listen & type</span></div>' +
        '<input class="dinput" type="text" placeholder="Type the sentence you hear..." autocomplete="off" autocapitalize="off">' +
        '<div class="dbtns"><button class="dcheck" data-i="' + i + '">✅ Check</button><button class="dshow" data-i="' + i + '">👁 Answer</button></div>' +
        '<div class="dfb" data-i="' + i + '"></div></div>';
    }).join('');
    $('dictTitle').textContent = s.name + ' · Dictation';
    $('dictBody').innerHTML = '<div class="dwrap"><p class="dhint">🎧 Click ▶ to play each sentence, type it, then click Check. Correct words turn green, missing/wrong words turn red.</p>' +
      (items.length ? body : '<p class="dhint">This section has no dictation yet.</p>') + '</div>';
    var root = $('dictBody');
    root.querySelectorAll('.dplay').forEach(function (b) { b.onclick = function () { var d = items[+b.getAttribute('data-i')]; playSeg(s, d.t, d.end || addSec(d.t, 6)); }; });
    root.querySelectorAll('.dcheck').forEach(function (b) { b.onclick = function () { checkDict(root, items, +b.getAttribute('data-i')); }; });
    root.querySelectorAll('.dshow').forEach(function (b) {
      b.onclick = function () { var i = +b.getAttribute('data-i'); var fb = root.querySelector('.dfb[data-i="' + i + '"]');
        fb.className = 'dfb show'; fb.innerHTML = '<div class="scoreline">Answer:</div>' + esc(items[i].text); };
    });
    var inputs = root.querySelectorAll('.dinput');
    inputs.forEach(function (inp, i) { inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') checkDict(root, items, i); }); });
    $('dictOverlay').classList.add('open');
  }
  function checkDict(root, items, i) {
    var card = root.querySelector('.dcard[data-i="' + i + '"]');
    var val = card.querySelector('.dinput').value;
    var tw = normWords(items[i].text).split(' ').filter(Boolean);
    var uw = normWords(val).split(' ').filter(Boolean);
    var bag = {}; uw.forEach(function (w) { bag[w] = (bag[w] || 0) + 1; });
    var got = 0;
    var html = tw.map(function (w) {
      if (bag[w] > 0) { bag[w]--; got++; return '<span class="ok">' + esc(w) + '</span>'; }
      return '<span class="miss">' + esc(w) + '</span>';
    }).join(' ');
    var pct = tw.length ? Math.round(got / tw.length * 100) : 0;
    var fb = card.querySelector('.dfb'); fb.className = 'dfb show';
    var head = pct === 100 ? '🎉 Perfect! ' : pct >= 70 ? '👍 Good job! ' : '💪 Keep trying! ';
    fb.innerHTML = '<div class="scoreline">' + head + got + '/' + tw.length + ' words correct (' + pct + '%)</div><div>' + html + '</div>';
    if (pct === 100) burst();
  }
  $('dictClose').onclick = function () { $('dictOverlay').classList.remove('open'); if (audio) audio.pause(); };
  $('dictOverlay').onclick = function (e) { if (e.target === $('dictOverlay')) { $('dictOverlay').classList.remove('open'); if (audio) audio.pause(); } };

  /* ---- Export standalone HTML with embedded MP3 ---- */
  function sectionExportObj(s, uri) {
    return {
      id: s.id, emoji: s.emoji, name: s.name, topic: s.topic, audioFile: s.audioFile,
      sample: false, questions: s.questions, vocab: s.vocab || [], structures: s.structures || [],
      transcript: s.transcript || [], dictation: s.dictation || [], audioData: uri || null
    };
  }
  function buildStudentFile(dataObj, filename) {
    var clone = document.documentElement.cloneNode(true);
    clone.querySelector('#appdata').textContent = JSON.stringify(dataObj);
    clone.querySelectorAll('.overlay').forEach(function (o) { o.classList.remove('open'); });
    downloadHtml('<!doctype html>\n' + clone.outerHTML, filename);
  }

  function exportSection(s) {
    getAudioDataUri(s, function (uri, err) {
      if (err === 'nofile') { alert('No MP3 for ' + s.name + ' yet.\nClick “📂 Load MP3” to load the audio first, then export.'); return; }
      if (err) { alert('Could not read the MP3 file. Please load it again.'); return; }
      showToast('⏳ Generating file (embedding MP3)...');
      var data = { title: s.name + ' — ' + s.topic, single: true, student: true, sections: [sectionExportObj(s, uri)] };
      buildStudentFile(data, 'Listening_' + s.name.replace(/\s+/g, '') + '.html');
      setTimeout(function () { showToast('✅ File exported! Send it to students — it runs offline with sound.'); }, 400);
    });
  }

  function exportFullTest() {
    showToast('⏳ Generating full test (embedding MP3s)...');
    var out = [], missing = [];
    (function next(idx) {
      if (idx >= SECTIONS.length) {
        var tname = TESTS[TID].name, book = APP.title || 'IELTS';
        var data = { title: book + ' — ' + tname, student: true, sections: out };
        buildStudentFile(data, book.replace(/\s+/g, '') + '_' + tname.replace(/\s+/g, '') + '.html');
        setTimeout(function () {
          showToast(missing.length ? ('✅ Exported. No audio for: ' + missing.join(', ')) : '✅ Full test exported with all audio!');
        }, 400);
        return;
      }
      var s = SECTIONS[idx];
      getAudioDataUri(s, function (uri, err) {
        if (err || !uri) missing.push(s.name);
        out.push(sectionExportObj(s, err ? null : uri));
        next(idx + 1);
      });
    })(0);
  }

  function getAudioDataUri(s, cb) {
    if (s._file) { readAsDataURL(s._file, cb); return; }
    // try to fetch the default file sitting next to the page
    try {
      fetch(s._blob || s.audioData || (AUDIO_BASE + s.audioFile)).then(function (r) { if (!r.ok) throw 0; return r.blob(); })
        .then(function (b) { readAsDataURL(b, cb); })
        .catch(function () { cb(null, 'nofile'); });
    } catch (e) { cb(null, 'nofile'); }
  }
  function readAsDataURL(blob, cb) {
    var r = new FileReader();
    r.onload = function () { cb(r.result); };
    r.onerror = function () { cb(null, 'read'); };
    r.readAsDataURL(blob);
  }
  function downloadHtml(html, name) {
    var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href = url; a.download = name;
    document.body.appendChild(a); a.click();
    setTimeout(function () { document.body.removeChild(a); URL.revokeObjectURL(url); }, 2000);
  }

  /* ---- Results ---- */
  function openResults() {
    var total = totalQ(), done = answeredCount(), right = rightCount();
    var pct = done ? Math.round(right / done * 100) : 0, m;
    if (done === 0) m = { e: '🤔', t: 'No answers yet', s: 'Click a question to start!' };
    else if (pct >= 90) m = { e: '🔥', t: 'ON FIRE!', s: 'Outstanding — keep it up!' };
    else if (pct >= 70) m = { e: '💪', t: 'Great job!', s: 'Solid work, a bit more practice for a top score!' };
    else if (pct >= 50) m = { e: '📚', t: 'Not bad!', s: 'Over halfway — keep practising and you will improve.' };
    else m = { e: '🤙', t: 'Keep practising!', s: 'Review the evidence for the ones you missed.' };

    var rows = SECTIONS.map(function (s) {
      var r = 0; s.questions.forEach(function (c) { r += cellCorrect(c, answers[key(s, c)]); });
      var tot = secTotal(s), w = tot ? r / tot * 100 : 0;
      return '<div class="res-row"><span class="rn">' + s.emoji + ' ' + s.name + '</span><span class="rbar"><i style="width:' + w + '%"></i></span><span class="rv">' + r + '/' + tot + '</span></div>';
    }).join('');

    var wrong = [];
    SECTIONS.forEach(function (s) { s.questions.forEach(function (c) { var ch = answers[key(s, c)]; if (cellDoneNums(c, ch) > 0 && cellCorrect(c, ch) < cellMax(c)) { cellNums(c).forEach(function (nn) { wrong.push('S' + s.id + '·Q' + nn); }); } }); });
    var wrongHtml = wrong.length ? '<div class="res-wrong"><b>To review (' + wrong.length + '):</b><div class="chips">' + wrong.map(function (x) { return '<span class="chip">' + x + '</span>'; }).join('') + '</div></div>' : '';

    $('resBody').innerHTML =
      '<div class="res-hero"><div class="res-emoji">' + m.e + '</div>' +
      '<p class="res-score">' + right + '<small>/' + done + '</small></p>' +
      '<p class="res-msg">' + m.t + '</p><p class="res-pct">' + pct + '% correct · ' + done + '/' + total + ' answered · ' + m.s + '</p></div>' +
      '<div class="res-list">' + rows + '</div>' + wrongHtml +
      '<div class="res-actions"><button class="act" id="resReview">📖 Review answers</button><button class="act hot" id="resRetry">🔄 Restart</button></div>';

    $('resReview').onclick = function () { $('resOverlay').classList.remove('open'); };
    $('resRetry').onclick = function () { doReset(); $('resOverlay').classList.remove('open'); };
    $('resOverlay').classList.add('open'); $('resClose').focus();
    if (done > 0 && pct >= 70) burst();
  }
  if (STUDENT) { var ea = $('btnExportAll'); if (ea) ea.style.display = 'none'; }
  else { $('btnExportAll').onclick = exportFullTest; }
  $('btnExam').onclick = function () {
    MODE = 'exam';
    var s0 = SECTIONS[active]; currentKey = key(s0, s0.questions[0]);
    startExam(); render();
    showToast('🧪 Exam room — do it like the real test, the timer is running!');
  };
  $('esmClose').onclick = function () { $('examSubmit').classList.remove('show'); };
  $('examSubmit').onclick = function (e) { if (e.target === $('examSubmit')) $('examSubmit').classList.remove('show'); };
  $('esmSubmit').onclick = doSubmit;

  /* ---- Điều chỉnh cỡ chữ (mọi mục) ---- */
  var fontScale = 1;
  function applyFont() {
    document.documentElement.style.setProperty('--zoom', fontScale);
    var l = $('fsLabel'); if (l) l.textContent = Math.round(fontScale * 100) + '%';
  }
  $('fsUp').onclick = function () { fontScale = Math.min(1.8, Math.round((fontScale + 0.1) * 10) / 10); applyFont(); };
  $('fsDown').onclick = function () { fontScale = Math.max(0.8, Math.round((fontScale - 0.1) * 10) / 10); applyFont(); };
  applyFont();
  $('btnResult').onclick = openResults;
  $('resClose').onclick = function () { $('resOverlay').classList.remove('open'); };
  $('resOverlay').onclick = function (e) { if (e.target === $('resOverlay')) $('resOverlay').classList.remove('open'); };

  function doReset() { answers = {}; flags = {}; currentKey = null; stopTimer(); MODE = 'study'; SECTIONS.forEach(function (s) { s._stopAt = null; }); render(); showToast('🧼 Reset — good luck!'); }
  var resetArmed = false, resetTimer = null;
  $('btnReset').onclick = function () {
    if (answeredCount() === 0) { doReset(); return; }
    if (resetArmed) { resetArmed = false; if (resetTimer) clearTimeout(resetTimer); doReset(); return; }
    resetArmed = true; showToast('⚠️ Click “Restart” again to erase all answers');
    resetTimer = setTimeout(function () { resetArmed = false; }, 3000);
  };

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      closeModal();
      $('resOverlay').classList.remove('open');
      $('transOverlay').classList.remove('open');
      $('dictOverlay').classList.remove('open');
      $('examSubmit').classList.remove('show');
    }
  });

  var toastTimer = null;
  function showToast(m) { var t = $('toast'); t.textContent = m; t.classList.add('show'); if (toastTimer) clearTimeout(toastTimer); toastTimer = setTimeout(function () { t.classList.remove('show'); }, 2400); }

  /* confetti */
  var cv = $('cf'), ctx = cv.getContext('2d'), parts = [], raf = null;
  function sz() { cv.width = innerWidth; cv.height = innerHeight; } sz(); addEventListener('resize', sz);
  var COL = ['#d8bd7b', '#c9a96a', '#3a63b0', '#6f9fd6', '#f4efe1', '#e6cf98'];
  function burst() {
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    for (var i = 0; i < 130; i++) parts.push({ x: cv.width / 2, y: cv.height * 0.3, vx: (Math.random() - .5) * 15, vy: Math.random() * -13 - 4,
      g: .38 + Math.random() * .3, s: 6 + Math.random() * 8, r: Math.random() * 6, vr: (Math.random() - .5) * .4, c: COL[i % COL.length], life: 90 + Math.random() * 40 });
    if (!raf) raf = requestAnimationFrame(tick);
  }
  function tick() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    for (var i = parts.length - 1; i >= 0; i--) { var p = parts[i]; p.vy += p.g; p.x += p.vx; p.y += p.vy; p.r += p.vr; p.life--;
      if (p.life <= 0 || p.y > cv.height + 30) { parts.splice(i, 1); continue; }
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r); ctx.fillStyle = p.c; ctx.globalAlpha = Math.max(0, Math.min(1, p.life / 40));
      ctx.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * .6); ctx.restore(); }
    if (parts.length) raf = requestAnimationFrame(tick); else { ctx.clearRect(0, 0, cv.width, cv.height); raf = null; }
  }

  render();
})();
</script>
